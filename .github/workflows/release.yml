name: Release

# Publish @razroo/agentmd to npm when a GitHub Release is published.
#
# One-time setup (NPM_TOKEN is shared across the razroo org):
#   1. Confirm the org-level NPM_TOKEN secret has publish rights on @razroo/*.
#   2. Ensure the npm org "razroo" exists and can accept the publish.
#
# Cutting a release (from your machine, via gh cli):
#   npm version patch                     # bumps 0.1.0 → 0.1.1 and tags v0.1.1
#   git push --follow-tags                # push the bump commit + the tag
#   gh release create "v$(node -p "require('./package.json').version")" \
#     --generate-notes \
#     --title "v$(node -p "require('./package.json').version")"
#
# Publishing the release fires this workflow. The verify step refuses to
# publish if the tag version doesn't match package.json, so a stale tag
# won't ship an outdated version.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Publish
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
